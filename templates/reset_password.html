{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <h4 class="card-title mb-3">Ganti Password</h4>
        {% if error %}
          <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="post" action="{{ url_for('reset_password_post', username=username) }}">
          <div class="mb-3">
            <label class="form-label">Password Baru</label>
            <input name="new_password" type="password" class="form-control" required>
          </div>
          <button class="btn btn-success">Ganti Password</button>
          <a class="btn btn-link" href="{{ url_for('login') }}">Kembali ke Login</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
