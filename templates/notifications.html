{% extends "base.html" %}
{% block content %}
<h4 class="mb-3"><i class="bi bi-bell text-primary me-2"></i> Notifications</h4>

<!-- 🔍 Search -->
<div class="row mb-3">
  <div class="col-md-6">
    <input id="searchBox" type="text" class="form-control" placeholder="Cari Review ID, Telegram ID, Status, atau Waktu...">
  </div>
</div>

<!-- 📋 Table -->
<div class="table-responsive" style="max-height: 70vh; overflow-y: auto;">
  <table class="table table-striped table-hover table-sm align-middle">
    <thead class="table-light sticky-top">
      <tr>
        <th style="width:50px;">No</th>
        <th style="width:100px;">Review ID</th>
        <th style="width:150px;">Telegram ID</th>
        <th style="width:100px;">Status</th>
        <th style="width:100px;">Tanggal</th>
        <th style="width:100px;">Jam</th>
      </tr>
    </thead>
    <tbody id="notifTableBody"></tbody>
  </table>
</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  const tbody = document.getElementById("notifTableBody");
  const searchBox = document.getElementById("searchBox");
  const loadMoreBtn = document.getElementById("loadMoreBtn");

  let allRows = [];
  let displayedRows = [];
  let displayedCount = 150;

  // 🔹 Format waktu jadi tanggal & jam (tanpa ubah nilai dari backend)
  function formatDateTime(rawTime) {
    if (!rawTime) return { date: "-", time: "-" };
    const clean = rawTime.replace("GMT", "").trim();

    // Jika format rawTime seperti "2025-10-16 09:44:29"
    if (clean.includes("-")) {
      const [datePart, timePart] = clean.split(" ");
      return { date: datePart, time: timePart + " WIB" };
    }

    // Jika format dari backend sudah seperti "Sat, 01 Nov 2025 10:53:24"
    const parts = clean.split(" ");
    const datePart = parts.slice(1, 4).join(" ");  // 01 Nov 2025
    const timePart = parts[4] ? parts[4] + " WIB" : "-";
    return { date: datePart, time: timePart };
  }

  // 🔹 Render Tabel
  function renderTable(rows) {
    if (!rows.length) {
      tbody.innerHTML = `<tr><td colspan="6" class="text-center text-muted fst-italic">No notifications</td></tr>`;
      return;
    }

    tbody.innerHTML = rows.slice(0, 150).map((n, i) => {
      const { date, time } = formatDateTime(n.created_at);
      return `
        <tr>
          <td>${i + 1}</td>
          <td class="review-id">${n.review_id}</td>
          <td class="chat-id">${n.chat_id}</td>
          <td class="notif-status">
            ${n.status === 'sent' ? '<span class="badge bg-success">Sent</span>' :
              n.status === 'failed' ? '<span class="badge bg-danger">Failed</span>' :
              `<span class="badge bg-secondary">${n.status}</span>`}
          </td>
          <td><small class="text-muted">${date}</small></td>
          <td><small class="text-muted">${time}</small></td>
        </tr>
      `;
    }).join("");
  }

  // 🔹 Ambil data
  async function fetchData(limit = 150) {
    const res = await fetch(`/api/notifications?limit=${limit}`);
    return res.json();
  }

  // 🟢 Load awal (150 data saja)
  try {
    displayedRows = await fetchData(150);
    renderTable(displayedRows);
  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="6" class="text-center text-danger fst-italic">Gagal memuat notifikasi.</td></tr>`;
    console.error(e);
  }

  // 🔍 Search seluruh data di backend
  searchBox.addEventListener("input", async () => {
    const term = searchBox.value.trim().toLowerCase();

    if (!term) {
      renderTable(displayedRows);
      return;
    }

    // Ambil semua data jika belum
    if (!allRows.length) {
      const res = await fetch(`/api/notifications?limit=0`);
      allRows = await res.json();
    }

    const filtered = allRows.filter(n => {
      const vals = [
        n.review_id?.toString().toLowerCase(),
        n.chat_id?.toString().toLowerCase(),
        n.status?.toLowerCase(),
        n.created_at?.toLowerCase()
      ];
      return vals.some(v => v && v.includes(term));
    });

    renderTable(filtered);
  });

  // 🔽 Load More (menambah jumlah data yang diambil dari backend)
  loadMoreBtn?.addEventListener("click", async () => {
    displayedCount += 100;
    const res = await fetch(`/api/notifications?limit=${displayedCount}`);
    displayedRows = await res.json();
    renderTable(displayedRows);
  });
});
</script>

{% endblock %}
