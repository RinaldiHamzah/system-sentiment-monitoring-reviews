<!-- templates/error.html -->
{% extends "base.html" %}
{% block content %}
<div class="container text-center" style="margin-top: 50px;">
    <h1 class="display-4 text-danger">Oops!</h1>
    <h3>{{ error_code or "Error" }} - {{ error_message or "Something went wrong." }}</h3>
    <p class="text-muted">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary mt-3">Go Home</a>
</div>
{% endblock %}
